  <title>Ovora Cargo</title>
  <script>
    // SPA on GitHub Pages: when a sub-route is refreshed/linked directly,
    // GitHub Pages serves this 404.html. We store the intended path in
    // sessionStorage and redirect to the app root so React Router can handle it.
    sessionStorage.setItem('__spa_redirect', location.pathname + location.search + location.hash);
  </script>
  <meta http-equiv="refresh" content="0;URL=/Ovoracargomobiledevelopment/">
</head>

</html>
