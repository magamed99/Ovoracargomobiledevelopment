name: Deploy to GitHub Pages

on:
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run typecheck || true

      - name: Tests
        run: npm run test

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          # DSN не секрет (см. Sentry docs) — безопасно хранить открыто, иначе
          # клиентский бандл всё равно его публикует у любого посетителя сайта.
          VITE_SENTRY_DSN: https://eece7ec757346f579308fcf051448120@o4510186278223872.ingest.us.sentry.io/4510186278354944
          # Cloudflare Turnstile site key — тоже не секрет (Cloudflare docs), но пока
          # не задан ни здесь, ни в Supabase (TURNSTILE_SECRET_KEY) — капча не активна,
          # см. docs/TURNSTILE_SETUP.md. Добавить repo variable VITE_TURNSTILE_SITE_KEY,
          # чтобы включить без правки этого файла.
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
