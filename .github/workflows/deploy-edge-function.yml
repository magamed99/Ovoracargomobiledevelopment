name: Deploy Supabase Edge Function

on:
  workflow_dispatch:
    inputs:
      supabase_token:
        description: 'Supabase Access Token (sbp_...)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        run: |
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_token }}
