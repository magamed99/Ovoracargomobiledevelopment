name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/**]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check token and environment
        run: |
          echo "Token length: ${#SUPABASE_ACCESS_TOKEN}"
          echo "Token prefix: ${SUPABASE_ACCESS_TOKEN:0:5}"
          supabase --version
          deno --version
          ls supabase/functions/make-server-4e36197a/
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Function
        run: |
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt \
            --debug 2>&1 || true
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
