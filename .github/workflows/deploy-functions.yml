name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/**]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        run: |
          echo "token_len=${#SUPABASE_ACCESS_TOKEN}"
          OUTPUT=$(supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt \
            --debug 2>&1 || true)
          echo "$OUTPUT"
          BODY=$(printf '%s' "$OUTPUT" | head -c 50000 | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/magamed99/Ovoracargomobiledevelopment/commits/${{ github.sha }}/comments" \
            -d "{\"body\":\"## Deploy log\n\`\`\`\n$(echo "$OUTPUT" | head -c 5000)\n\`\`\`\"}" || true
          echo "$OUTPUT" | grep -q "Deployed Function"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
