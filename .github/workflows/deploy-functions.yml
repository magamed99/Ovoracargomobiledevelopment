name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/**]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        run: |
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt 2>&1 | tee /tmp/deploy_out.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "## Deploy Output" >> $GITHUB_STEP_SUMMARY
          cat /tmp/deploy_out.txt >> $GITHUB_STEP_SUMMARY
          exit $EXIT_CODE
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
