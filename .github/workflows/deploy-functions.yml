name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/**]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        run: |
          echo "=== Supabase CLI version ==="
          supabase --version
          echo "=== Checking token (first 8 chars) ==="
          echo "${SUPABASE_ACCESS_TOKEN:0:8}..."
          echo "=== Deploying ==="
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt \
            --debug 2>&1 || true
          echo "=== Exit code: $? ==="
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
