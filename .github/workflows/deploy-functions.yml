name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/**]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        id: deploy
        run: |
          echo "## Deploy Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt \
            --debug 2>&1 | tee -a $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Deno version: $(deno --version)" >> $GITHUB_STEP_SUMMARY
          echo "Supabase CLI version: $(supabase --version)" >> $GITHUB_STEP_SUMMARY
          # Re-run to get exit code
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt \
            --debug
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
