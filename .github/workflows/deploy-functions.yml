name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/**]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        working-directory: /tmp
        run: |
          mkdir -p supabase/functions
          cp -r $GITHUB_WORKSPACE/supabase/functions/make-server-4e36197a supabase/functions/
          cat > supabase/config.toml << 'EOF'
          project_id = "mkbcjxnoeevtkzaqcpsh"
          [functions.make-server-4e36197a]
          verify_jwt = false
          EOF
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
