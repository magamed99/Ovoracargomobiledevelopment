name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/**]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Test token and list functions
        run: |
          echo "Token prefix: ${SUPABASE_ACCESS_TOKEN:0:8}"
          supabase functions list --project-ref mkbcjxnoeevtkzaqcpsh 2>&1 || echo "LIST_FAILED: $?"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Function
        run: |
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt 2>&1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
