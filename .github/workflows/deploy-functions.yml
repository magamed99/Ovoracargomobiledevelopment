name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/**]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        run: |
          echo "=== TOKEN INFO ==="
          echo "Length: ${#SUPABASE_ACCESS_TOKEN}"
          echo "Prefix: ${SUPABASE_ACCESS_TOKEN:0:8}..."
          echo "=== SUPABASE VERSION ==="
          supabase --version
          echo "=== DEPLOY ==="
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt \
            --debug
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
