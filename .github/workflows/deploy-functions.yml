name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/**]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Remove local config
        run: rm -f supabase/config.toml

      - name: Deploy Edge Function
        run: |
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt \
            --debug 2>&1 | tee /tmp/deploy_out.txt
          echo "EXIT: ${PIPESTATUS[0]}" >> /tmp/deploy_out.txt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Report error to issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('/tmp/deploy_out.txt', 'utf8').slice(0, 5000); } catch(e) { output = 'No output captured'; }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy error ${new Date().toISOString()}`,
              body: '```\n' + output + '\n```'
            });
