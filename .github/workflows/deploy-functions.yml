name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main, claude/**]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy and capture output
        run: |
          TOKEN_LEN=${#SUPABASE_ACCESS_TOKEN}
          TOKEN_PFX="${SUPABASE_ACCESS_TOKEN:0:6}"
          echo "token_length=$TOKEN_LEN token_prefix=$TOKEN_PFX" > /tmp/deploy_info.txt
          echo "--- supabase version ---" >> /tmp/deploy_info.txt
          supabase --version >> /tmp/deploy_info.txt 2>&1
          echo "--- deploy output ---" >> /tmp/deploy_info.txt
          supabase functions deploy make-server-4e36197a \
            --project-ref mkbcjxnoeevtkzaqcpsh \
            --no-verify-jwt \
            --debug >> /tmp/deploy_info.txt 2>&1 && echo "DEPLOY_SUCCESS=true" >> /tmp/deploy_info.txt || echo "DEPLOY_SUCCESS=false" >> /tmp/deploy_info.txt
          cat /tmp/deploy_info.txt
          cp /tmp/deploy_info.txt deploy_debug.txt
          git config user.email "ci@github.com"
          git config user.name "CI"
          git add deploy_debug.txt
          git commit -m "ci: deploy debug output [skip ci]" || true
          git push origin HEAD:claude/analyze-cloud-deployment-lzK8r || true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Fail if deploy failed
        run: |
          grep -q "DEPLOY_SUCCESS=true" /tmp/deploy_info.txt
