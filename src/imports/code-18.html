<!DOCTYPE html>

<html class="dark" lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1978e5", "background-light": "#f6f7f8", "background-dark": "#111821"}, fontFamily: {display: "Sora"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .map-gradient { background: linear-gradient(180deg, rgba(16,25,34,0.8) 0%, rgba(16,25,34,0) 20%, rgba(16,25,34,0) 80%, rgba(16,25,34,0.9) 100%); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden h-screen font-display">
<!-- Main Map Container -->
<div class="relative h-full w-full overflow-hidden">
<!-- Map Placeholder (Simulating Yandex Map Night Mode) -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover grayscale brightness-50" data-alt="Dark stylized navigation map of Russia and Central Asia" data-location="Russia" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6dYO50vS8SaLpAUGl5Sj_Pz78dMH63Y6ou9xShhnMO3pw6khGuF0VlsqJr4NkPqoK4nZKDCi-BgmjfmBAXHec6zvC_2DE7k5riC_w9i1x9Of9H5zM0qt5TkhQNeuVEVHSA6GYGsj_6qVwAuGk8D4nfpVj8_CupprIaUrQAOZNMXWqgjtx997IDEgJWxFyb9da6XLWFZU76Nm3W2IpNSxa9qEAHaD90w8fMBfvbOhdw_ro3XEQWqjvaGHQ2nsWvQNIii-RUI3etJ7-"/>
<div class="absolute inset-0 map-gradient pointer-events-none"></div>
<!-- SVG Route Overlay -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 400 800">
<!-- Route Line -->
<path d="M 320 700 Q 250 500 150 300 T 80 100" fill="none" opacity="0.8" stroke="#137fec" stroke-dasharray="8 12" stroke-linecap="round" stroke-width="4"></path>
<!-- Origin Marker (Dushanbe) -->
<circle cx="320" cy="700" fill="#137fec" r="6"></circle>
<text fill="white" font-size="12" font-weight="bold" x="240" y="720">Душанбе</text>
<!-- Destination Marker (Moscow) -->
<circle cx="80" cy="100" fill="#137fec" r="6"></circle>
<text fill="white" font-size="12" font-weight="bold" x="95" y="105">Москва</text>
<!-- Truck Indicator (Positioned around Samara area) -->
<g transform="translate(180, 380)">
<circle class="animate-pulse opacity-40" cx="0" cy="0" fill="#137fec" r="16"></circle>
<circle cx="0" cy="0" fill="#137fec" r="10"></circle>
<path d="M-4 -3 L4 -3 L4 3 L-4 3 Z" fill="white"></path>
<rect fill="white" height="4" width="2" x="-6" y="-1"></rect>
</g>
</svg>
</div>
<!-- Top Navigation Overlay -->
<div class="absolute top-0 left-0 right-0 p-6 pt-12 z-20 flex justify-between items-start">
<button class="w-10 h-10 rounded-full bg-background-dark/60 ios-blur flex items-center justify-center text-white border border-white/10">
<span class="material-icons text-xl">arrow_back_ios_new</span>
</button>
<div class="bg-background-dark/60 ios-blur px-4 py-2 rounded-full border border-white/10 text-center">
<p class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">Заказ № OV-99283</p>
<p class="text-sm font-bold text-white">В пути — 65%</p>
</div>
<button class="w-10 h-10 rounded-full bg-background-dark/60 ios-blur flex items-center justify-center text-white border border-white/10">
<span class="material-icons text-xl">share</span>
</button>
</div>
<!-- Floating Action Buttons (Right side) -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 z-20 flex flex-col gap-3">
<button class="w-12 h-12 rounded-xl bg-background-dark/80 ios-blur flex items-center justify-center text-white border border-white/10 shadow-lg">
<span class="material-icons">my_location</span>
</button>
<button class="w-12 h-12 rounded-xl bg-background-dark/80 ios-blur flex items-center justify-center text-white border border-white/10 shadow-lg">
<span class="material-icons">layers</span>
</button>
<div class="flex flex-col rounded-xl bg-background-dark/80 ios-blur border border-white/10 shadow-lg divide-y divide-white/10">
<button class="w-12 h-12 flex items-center justify-center text-white">
<span class="material-icons">add</span>
</button>
<button class="w-12 h-12 flex items-center justify-center text-white">
<span class="material-icons">remove</span>
</button>
</div>
</div>
<!-- Bottom Sheet Panel -->
<div class="absolute bottom-0 left-0 right-0 z-30 transform transition-transform duration-500 translate-y-0">
<div class="bg-slate-900/95 dark:bg-background-dark/95 ios-blur rounded-t-[2.5rem] border-t border-white/10 shadow-2xl p-6 pb-12">
<!-- Handle -->
<div class="w-12 h-1.5 bg-slate-700/50 rounded-full mx-auto mb-8"></div>
<!-- Main Status Header -->
<div class="flex items-center justify-between mb-8">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="flex h-2 w-2 rounded-full bg-green-500"></span>
<span class="text-xs font-bold text-primary uppercase tracking-widest">В пути</span>
</div>
<h1 class="text-3xl font-extrabold text-white">3 дня 5 часов</h1>
<p class="text-slate-400 text-sm">Примерное время прибытия</p>
</div>
<div class="text-right">
<p class="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">Дистанция</p>
<p class="text-xl font-bold text-white">1,420 км</p>
</div>
</div>
<!-- Info Grid -->
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="bg-white/5 border border-white/5 p-4 rounded-2xl">
<div class="flex items-center gap-2 mb-2">
<span class="material-icons text-primary text-sm">location_on</span>
<span class="text-xs text-slate-400 font-medium">Текущий город</span>
</div>
<p class="text-lg font-bold text-white">Самара</p>
<p class="text-xs text-slate-500">РФ, Самарская обл.</p>
</div>
<div class="bg-white/5 border border-white/5 p-4 rounded-2xl">
<div class="flex items-center gap-2 mb-2">
<span class="material-icons text-primary text-sm">schedule</span>
<span class="text-xs text-slate-400 font-medium">Обновлено</span>
</div>
<p class="text-lg font-bold text-white">2 мин. назад</p>
<p class="text-xs text-slate-500">GPS Сигнал: Отличный</p>
</div>
</div>
<!-- Driver Card -->
<div class="bg-primary/10 border border-primary/20 p-4 rounded-2xl flex items-center justify-between mb-8">
<div class="flex items-center gap-4">
<div class="relative">
<img class="w-14 h-14 rounded-full object-cover border-2 border-primary" data-alt="Professional truck driver portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-4yAna_GNmXXB6O72o-OpaolfC0KPsrj6LUV5qZEgRl00CPA1a8bwu67tLl3DslSTTCmtDru5TvPHvPotJwkQLViJLahKawltN9lgamyOxtvYt5r83AwGQhGqbloQ6-WHpKwyPUXuqzVuv5xdexNw37E5yLpEzzwCkiXd7fGMg30VbSFH8Plmpt7an3S4zcP58LIO0IhVbfXZ4dqeV7mNIeLtoNM1I4eqJ5U-FLz1WBIyw1cYy1thWU8qeqnDlsFiIsjdU4fxQebX"/>
<div class="absolute -bottom-1 -right-1 bg-green-500 w-4 h-4 rounded-full border-2 border-slate-900"></div>
</div>
<div>
<p class="text-xs text-slate-400 font-medium">Водитель</p>
<h3 class="text-lg font-bold text-white">Алишер К.</h3>
<div class="flex items-center gap-1">
<span class="material-icons text-yellow-500 text-[14px]">star</span>
<span class="text-xs font-bold text-white">4.9</span>
<span class="text-[10px] text-slate-500 ml-1">Volvo FH16 (TJ 0011 AC)</span>
</div>
</div>
</div>
<button class="bg-primary hover:bg-primary/90 transition-colors h-12 w-12 rounded-full flex items-center justify-center text-white shadow-lg shadow-primary/30">
<span class="material-icons">phone_in_talk</span>
</button>
</div>
<!-- Action Button -->
<button class="w-full bg-white text-slate-900 font-bold py-4 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-icons text-xl">message</span>
                    Написать сообщение
                </button>
</div>
</div>
</div>
<!-- Navigation Bar (iOS Indicator) -->
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/20 rounded-full z-40 pointer-events-none"></div>
</body></html>
