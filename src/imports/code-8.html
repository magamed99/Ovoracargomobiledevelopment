<!DOCTYPE html>

<html class="light dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ovora Cargo - Role Selection</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1978e5", "background-light": "#f6f7f8", "background-dark": "#111821"}, fontFamily: {display: "Sora"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        /* Custom styles to ensure smooth transitions */
        .card-transition {
            transition: all 0.2s ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-hidden max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-2xl">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">
                Ovora Cargo
            </h2>
</div>
<!-- Heading -->
<div class="px-6 pt-6 pb-4">
<h1 class="text-slate-900 dark:text-white tracking-tight text-[32px] font-extrabold leading-tight text-center">
                Кто вы?
            </h1>
<p class="text-slate-500 dark:text-slate-400 text-center mt-2 text-sm">
                Выберите вашу роль, чтобы продолжить
            </p>
</div>
<!-- Role Selection Cards -->
<div class="flex-1 px-4 flex flex-col gap-4 mt-2">
<!-- Driver Card (Active State Example) -->
<label class="cursor-pointer group relative">
<input checked="" class="peer sr-only" name="role" type="radio" value="driver"/>
<div class="card-transition flex flex-col gap-4 rounded-2xl border-[3px] border-primary bg-white dark:bg-slate-800 p-5 shadow-sm peer-checked:border-primary peer-checked:bg-primary/[0.03] dark:peer-checked:bg-primary/[0.1] hover:border-primary/50 border-transparent">
<div class="flex justify-between items-start">
<div class="flex items-center justify-center rounded-xl bg-primary/10 text-primary w-14 h-14 shrink-0">
<span class="material-symbols-outlined text-[32px]">directions_car</span>
</div>
<div class="text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[28px] fill-1">check_circle</span>
</div>
<!-- Unchecked circle visual -->
<div class="text-slate-300 dark:text-slate-600 absolute top-5 right-5 peer-checked:hidden">
<span class="material-symbols-outlined text-[28px]">radio_button_unchecked</span>
</div>
<!-- Checked circle visual (using sibling selector on parent isn't enough for absolute positioning easily without JS logic or duplicating, sticking to standard flow) -->
<div class="text-primary absolute top-5 right-5 hidden peer-checked:block">
<span class="material-symbols-outlined text-[28px]">check_circle</span>
</div>
</div>
<div class="flex flex-col gap-1">
<h3 class="text-slate-900 dark:text-white text-xl font-bold leading-tight">Водитель</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-relaxed">
                            Предлагайте поездки и зарабатывайте
                        </p>
</div>
</div>
</label>
<!-- Sender Card (Inactive State Example) -->
<label class="cursor-pointer group relative">
<input class="peer sr-only" name="role" type="radio" value="sender"/>
<div class="card-transition flex flex-col gap-4 rounded-2xl border-[3px] border-transparent bg-white dark:bg-slate-800 p-5 shadow-sm peer-checked:border-primary peer-checked:bg-primary/[0.03] dark:peer-checked:bg-primary/[0.1] hover:bg-slate-50 dark:hover:bg-slate-700/50">
<div class="flex justify-between items-start">
<div class="flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 peer-checked:bg-primary/10 peer-checked:text-primary w-14 h-14 shrink-0 transition-colors">
<span class="material-symbols-outlined text-[32px]">inventory_2</span>
</div>
<!-- Unchecked circle visual -->
<div class="text-slate-300 dark:text-slate-600 absolute top-5 right-5 peer-checked:hidden">
<span class="material-symbols-outlined text-[28px]">radio_button_unchecked</span>
</div>
<!-- Checked circle visual -->
<div class="text-primary absolute top-5 right-5 hidden peer-checked:block">
<span class="material-symbols-outlined text-[28px]">check_circle</span>
</div>
</div>
<div class="flex flex-col gap-1">
<h3 class="text-slate-900 dark:text-white text-xl font-bold leading-tight">Отправитель</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-relaxed">
                            Находите попутчиков и отправляйте грузы
                        </p>
</div>
</div>
</label>
</div>
<!-- Bottom Action -->
<div class="mt-auto p-4 pb-8 bg-background-light dark:bg-background-dark">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary hover:bg-primary/90 active:scale-[0.98] transition-all shadow-lg shadow-primary/20">
<span class="text-white text-lg font-bold leading-normal tracking-wide">Продолжить</span>
</button>
<p class="text-center text-xs text-slate-400 mt-4">
                Нажимая «Продолжить», вы принимаете условия сервиса
            </p>
</div>
</div>
</body></html>
