<!DOCTYPE html>

<html class="dark" lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Настройка маршрута - Ovora Cargo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1978e5", "background-light": "#f6f7f8", "background-dark": "#111821"}, fontFamily: {display: "Sora"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .route-line::before {
            content: '';
            position: absolute;
            left: 23px;
            top: 40px;
            bottom: 40px;
            width: 2px;
            background: repeating-linear-gradient(to bottom, #e7c055 0px, #e7c055 4px, transparent 4px, transparent 8px);
            z-index: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Mobile Container (Simulating Phone Form Factor) -->
<div class="max-w-md mx-auto min-h-screen bg-background-light dark:bg-background-dark shadow-xl flex flex-col relative overflow-hidden">
<!-- Header / Navigation Bar -->
<header class="sticky top-0 z-30 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-4 flex items-center justify-between border-b border-primary/10">
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-icons-round align-middle text-2xl">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Маршрут</h1>
<button class="text-primary font-semibold px-2">Готово</button>
</header>
<!-- Main Scrollable Content -->
<main class="flex-1 overflow-y-auto px-4 py-6">
<!-- Route Section -->
<div class="relative space-y-4 mb-8 route-line">
<!-- Origin Point -->
<div class="relative z-10 flex items-center gap-4 bg-white dark:bg-zinc-900 p-4 rounded-xl border border-primary/20 shadow-sm">
<div class="w-12 h-12 flex items-center justify-center shrink-0">
<div class="w-5 h-5 rounded-full border-4 border-primary bg-white"></div>
</div>
<div class="flex-1">
<label class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Откуда</label>
<p class="font-semibold text-lg">Душанбе, Таджикистан</p>
</div>
<div class="p-2 text-slate-300 cursor-default">
<span class="material-icons-round">lock</span>
</div>
</div>
<!-- Stop 1 (Draggable) -->
<div class="relative z-10 flex items-center gap-4 bg-white dark:bg-zinc-900 p-4 rounded-xl border border-primary/10 shadow-sm group">
<div class="w-12 h-12 flex items-center justify-center shrink-0">
<div class="w-3 h-3 rounded-full bg-primary/60"></div>
</div>
<div class="flex-1">
<label class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Остановка 1</label>
<p class="font-medium">Худжанд</p>
</div>
<div class="flex items-center gap-2">
<button class="p-1 text-slate-400 hover:text-red-400 transition-colors">
<span class="material-icons-round text-xl">remove_circle_outline</span>
</button>
<div class="p-1 text-slate-400 cursor-grab active:cursor-grabbing">
<span class="material-icons-round">drag_indicator</span>
</div>
</div>
</div>
<!-- Stop 2 (Draggable) -->
<div class="relative z-10 flex items-center gap-4 bg-white dark:bg-zinc-900 p-4 rounded-xl border border-primary/10 shadow-sm">
<div class="w-12 h-12 flex items-center justify-center shrink-0">
<div class="w-3 h-3 rounded-full bg-primary/60"></div>
</div>
<div class="flex-1">
<label class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Остановка 2</label>
<p class="font-medium">Самарканд, Узбекистан</p>
</div>
<div class="flex items-center gap-2">
<button class="p-1 text-slate-400 hover:text-red-400 transition-colors">
<span class="material-icons-round text-xl">remove_circle_outline</span>
</button>
<div class="p-1 text-slate-400 cursor-grab active:cursor-grabbing">
<span class="material-icons-round">drag_indicator</span>
</div>
</div>
</div>
<!-- Destination Point -->
<div class="relative z-10 flex items-center gap-4 bg-white dark:bg-zinc-900 p-4 rounded-xl border border-primary/20 shadow-sm">
<div class="w-12 h-12 flex items-center justify-center shrink-0">
<div class="w-5 h-5 flex items-center justify-center text-primary">
<span class="material-icons-round">location_on</span>
</div>
</div>
<div class="flex-1">
<label class="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Куда</label>
<p class="font-semibold text-lg">Москва, Россия</p>
</div>
<div class="p-2 text-slate-300">
<span class="material-icons-round">lock</span>
</div>
</div>
</div>
<!-- Search Area -->
<div class="space-y-4">
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-icons-round text-slate-400 group-focus-within:text-primary transition-colors">search</span>
<input class="w-full bg-white dark:bg-zinc-900 border-2 border-slate-100 dark:border-zinc-800 focus:border-primary dark:focus:border-primary rounded-xl py-4 pl-12 pr-4 outline-none transition-all placeholder:text-slate-400" placeholder="Добавить промежуточный город" type="text"/>
</div>
<!-- Autocomplete Suggestions -->
<div class="bg-white dark:bg-zinc-900 rounded-xl border border-slate-100 dark:border-zinc-800 overflow-hidden shadow-lg">
<div class="p-4 border-b border-slate-50 dark:border-zinc-800 flex items-center gap-4 hover:bg-primary/5 cursor-pointer">
<span class="material-icons-round text-slate-400">history</span>
<div>
<p class="font-medium text-sm">Оренбург</p>
<p class="text-xs text-slate-400">Россия</p>
</div>
</div>
<div class="p-4 border-b border-slate-50 dark:border-zinc-800 flex items-center gap-4 hover:bg-primary/5 cursor-pointer">
<span class="material-icons-round text-slate-400">location_city</span>
<div>
<p class="font-medium text-sm">Самара</p>
<p class="text-xs text-slate-400">Россия</p>
</div>
</div>
<div class="p-4 flex items-center gap-4 hover:bg-primary/5 cursor-pointer">
<span class="material-icons-round text-slate-400">location_city</span>
<div>
<p class="font-medium text-sm">Челябинск</p>
<p class="text-xs text-slate-400">Россия</p>
</div>
</div>
</div>
</div>
<!-- Map Preview (Simplified) -->
<div class="mt-8 rounded-2xl overflow-hidden relative h-48 border-4 border-white dark:border-zinc-800 shadow-md">
<img class="w-full h-full object-cover grayscale opacity-50 dark:invert" data-alt="Abstract map view of Central Asia and Russia" data-location="Dushanbe" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-KebXfY9FaRoVJwu6KisndDq6LdpV6vVpUhIcPW4u73TmoUkIkHrX5cNW6hfGkm8yVwRl0g7lgNzXq1S-ApDYJZ2f9j-5olqjb14CY-BJgk2RcqWgBUpxnz46A9MSGhcV3M_QDubxNgVmfqIi9jDGO2mtztPtnkeZHFCPYmmuPqbeiw8J45rTPhiYN7NcBvQbPcvnwf3kLh0I2rTOPZbt11-jtnbXIDOZ5MQFIhY_fhDO1B7OYaJZd02qpj85tRoHnqxmM22qqN36"/>
<div class="absolute inset-0 bg-gradient-to-t from-background-light dark:from-background-dark to-transparent"></div>
<div class="absolute inset-0 flex items-center justify-center">
<button class="bg-white dark:bg-zinc-800 px-4 py-2 rounded-full shadow-lg text-sm font-bold flex items-center gap-2">
<span class="material-icons-round text-primary text-sm">map</span>
                        Посмотреть на карте
                    </button>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="p-6 bg-white dark:bg-zinc-900 border-t border-slate-100 dark:border-zinc-800">
<button class="w-full bg-primary hover:bg-primary/90 text-zinc-900 font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-transform active:scale-95 shadow-lg shadow-primary/20">
<span class="material-icons-round">route</span>
                Сохранить маршрут
            </button>
<p class="text-center text-xs text-slate-400 mt-4 px-4 leading-tight">
                Вы можете изменить порядок остановок, зажав иконку <span class="material-icons-round align-middle text-xs">drag_indicator</span>
</p>
</footer>
</div>
</body></html>
