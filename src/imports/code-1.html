<!DOCTYPE html>

<html class="dark" lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ovora Cargo - AI Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1978e5", "background-light": "#f6f7f8", "background-dark": "#111821"}, fontFamily: {display: "Sora"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #2b7cee, transparent);
            box-shadow: 0 0 15px #2b7cee;
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .ar-corner {
            width: 40px;
            height: 40px;
            border-color: #2b7cee;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased overflow-hidden">
<!-- Main Viewport (Phone Frame Simulation) -->
<div class="relative mx-auto max-w-[430px] h-screen bg-black overflow-hidden shadow-2xl">
<!-- Camera Viewfinder Background -->
<div class="absolute inset-0 z-0">
<img alt="Blurred view of a vehicle registration document on a table" class="w-full h-full object-cover opacity-60 scale-110 blur-[2px]" data-alt="Blurred view of a vehicle registration document on a table" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAc9aQGK0VBYkfaEADdMGa2KrTW8DUyOoFHM4cQRDjS1O3wwpngoNI_49ItGfS0PTVaEnfxH97KDcqSWDOtLPtjxUWpXZ6kya35zaZCwoNs50APdeCeMXUrVMdYgvDkcFmaEP36R7HcJPOHCUfsWpihKpspbUPtLe9ZiSYI8Xrxm86XkeMACxzzZpXpQzr78-hujiWJwy0_O8ORXm715hqhRwlGRjy_PHi5zc8mIdU2biYyEjszfhuBS_YgRkM5QfwDqWvtf8819He2"/>
</div>
<!-- Interface Overlays -->
<div class="relative z-10 h-full flex flex-col justify-between p-6">
<!-- Header -->
<div class="flex items-center justify-between">
<button class="w-10 h-10 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20">
<span class="material-icons text-white">close</span>
</button>
<div class="px-4 py-1.5 rounded-full bg-primary/20 backdrop-blur-md border border-primary/40 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-xs font-medium tracking-wider uppercase text-primary">AI Сканирование</span>
</div>
<button class="w-10 h-10 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20">
<span class="material-icons text-white">flash_on</span>
</button>
</div>
<!-- AR Scanning Frame -->
<div class="flex-grow flex items-center justify-center relative">
<div class="w-full aspect-[1.6/1] max-w-[340px] relative">
<!-- Corners -->
<div class="absolute -top-1 -left-1 ar-corner border-t-4 border-l-4 rounded-tl-xl"></div>
<div class="absolute -top-1 -right-1 ar-corner border-t-4 border-r-4 rounded-tr-xl"></div>
<div class="absolute -bottom-1 -left-1 ar-corner border-b-4 border-l-4 rounded-bl-xl"></div>
<div class="absolute -bottom-1 -right-1 ar-corner border-b-4 border-r-4 rounded-br-xl"></div>
<!-- Scanning Line -->
<div class="absolute left-0 right-0 scan-line z-20"></div>
<!-- Feedback Toast -->
<div class="absolute -top-16 left-0 right-0 flex justify-center">
<div class="bg-background-dark/80 backdrop-blur-xl px-4 py-2 rounded-full border border-primary/30 flex items-center gap-2">
<span class="material-icons text-primary text-sm">light_mode</span>
<span class="text-sm font-medium">Мало света. Держите ровно</span>
</div>
</div>
<!-- Target Overlay Area -->
<div class="absolute inset-0 bg-primary/5 rounded-xl border border-white/10"></div>
</div>
</div>
<!-- Bottom Controls -->
<div class="space-y-6">
<!-- Tab Switcher -->
<div class="bg-white/5 backdrop-blur-xl p-1 rounded-xl flex border border-white/10">
<button class="flex-1 py-2.5 text-sm font-medium rounded-lg bg-primary text-white">СТС</button>
<button class="flex-1 py-2.5 text-sm font-medium text-white/60">Паспорт РФ/ТД</button>
</div>
<div class="flex flex-col items-center gap-4">
<p class="text-white/60 text-xs text-center px-8 uppercase tracking-widest leading-relaxed">
                        Поместите документ в рамку.<br/>Процесс начнется автоматически.
                    </p>
<button class="w-16 h-16 rounded-full border-4 border-white/30 p-1">
<div class="w-full h-full rounded-full bg-white shadow-lg"></div>
</button>
</div>
</div>
</div>
<!-- Results Preview Sheet (Hidden by default, shown as a slide-up animation in a real app) -->
<!-- In this UI, we show it as an active overlay for review -->
<div class="absolute inset-x-0 bottom-0 z-50 transform translate-y-0">
<div class="bg-background-light dark:bg-background-dark rounded-t-3xl shadow-2xl p-6 border-t border-primary/20">
<div class="w-12 h-1 bg-slate-300 dark:bg-slate-700 rounded-full mx-auto mb-6"></div>
<div class="flex items-center gap-4 mb-6">
<div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center">
<span class="material-icons text-primary">auto_awesome</span>
</div>
<div>
<h3 class="text-lg font-bold leading-none">Данные распознаны</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Проверьте корректность перед отправкой</p>
</div>
</div>
<div class="space-y-4 mb-8">
<!-- Data Fields -->
<div class="group">
<label class="text-[10px] uppercase tracking-wider font-bold text-primary mb-1 block">Марка и модель</label>
<div class="relative">
<input class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-primary/50" type="text" value="TOYOTA CAMRY"/>
<span class="material-icons absolute right-4 top-1/2 -translate-y-1/2 text-primary/40 text-sm">edit</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="group">
<label class="text-[10px] uppercase tracking-wider font-bold text-primary mb-1 block">Госномер</label>
<div class="relative">
<input class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-primary/50" type="text" value="А 777 АА 77"/>
<span class="material-icons absolute right-4 top-1/2 -translate-y-1/2 text-primary/40 text-sm">edit</span>
</div>
</div>
<div class="group">
<label class="text-[10px] uppercase tracking-wider font-bold text-primary mb-1 block">Цвет</label>
<div class="relative">
<input class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-primary/50" type="text" value="ЧЕРНЫЙ"/>
<span class="material-icons absolute right-4 top-1/2 -translate-y-1/2 text-primary/40 text-sm">edit</span>
</div>
</div>
</div>
<div class="group">
<label class="text-[10px] uppercase tracking-wider font-bold text-primary mb-1 block">ФИО Владельца</label>
<div class="relative">
<input class="w-full bg-slate-100 dark:bg-white/5 border-none rounded-xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-primary/50" type="text" value="АЛИЕВ САИД РАХМОНОВИЧ"/>
<span class="material-icons absolute right-4 top-1/2 -translate-y-1/2 text-primary/40 text-sm">edit</span>
</div>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-3">
<span>ВСЁ ВЕРНО, ПРОДОЛЖИТЬ</span>
<span class="material-icons text-sm">arrow_forward_ios</span>
</button>
<button class="w-full mt-4 py-2 text-slate-500 dark:text-slate-400 text-sm font-medium">
                    Переснять документ
                </button>
</div>
</div>
<!-- Notification Bubble -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 z-20 w-max pointer-events-none opacity-0">
<div class="bg-primary px-4 py-2 rounded-full text-white text-xs font-bold flex items-center gap-2 shadow-xl">
<span class="material-icons text-sm">check_circle</span>
                 ДОКУМЕНТ ОБНАРУЖЕН
             </div>
</div>
</div>
<!-- Background Decoration for Desktop View -->
<div class="hidden lg:block fixed inset-0 -z-10 bg-background-light dark:bg-background-dark">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
</div>
</body></html>
