<!DOCTYPE html>

<html class="dark" lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SOS Экстренная помощь - Ovora Cargo</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {primary: "#1978e5", "background-light": "#f6f7f8", "background-dark": "#111821"}, fontFamily: {display: "Sora"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}}}};</script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .sos-glow {
            box-shadow: 0 0 40px rgba(242, 13, 13, 0.4);
        }
        .map-gradient-overlay {
            background: linear-gradient(to bottom, transparent 60%, #221010 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>

      min-height: max(884px, 100dvh);

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex justify-center items-center">
<!-- Mobile Container (iPhone Pro Max Aspect Ratio) -->
<div class="relative w-full max-w-[430px] h-[932px] bg-background-light dark:bg-background-dark overflow-hidden shadow-2xl border-x border-primary/10">
<!-- Status Bar Space -->
<div class="h-12 w-full flex justify-between items-center px-8 pt-4">
<span class="font-bold text-sm">9:41</span>
<div class="flex gap-1.5">
<span class="material-icons-round text-xs">signal_cellular_alt</span>
<span class="material-icons-round text-xs">wifi</span>
<span class="material-icons-round text-xs">battery_full</span>
</div>
</div>
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4">
<button class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-round">arrow_back_ios_new</span>
</button>
<h1 class="text-xl font-bold tracking-tight">SOS Помощь</h1>
<button class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-icons-round">settings</span>
</button>
</header>
<!-- Map Section -->
<div class="relative w-full h-[320px] mt-2">
<div class="absolute inset-0 bg-slate-800 overflow-hidden">
<img alt="Map view showing driver locations" class="w-full h-full object-cover opacity-60 grayscale brightness-50" data-alt="Dark themed navigation map with vehicle icons" data-location="Moscow-Dushanbe Route" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCeJrxTs2UbleA2IyoNWt6vS3hEy5ugUN-f85gHNYeViQkHwW4xDVgAWtIYM7rFMEwJmeSQ82rtgIElf5wiSVHb_Mdmt7qwDxACSn5zYawpETc3y6uCDZKc0YId2KvstYSEeLf8z4jLFAMsKSbBBk3YrK8XdDaOAobZZ_V4hiw9WNATwqS-9aKpwlmxyFX02KhF6tswloKnQcv0U-yJ4ab6phpvTxISx_s5c8vo7Dn02mQB9sS-2hWci7_cS6BowHi9eKbb9oqVnXTb"/>
<!-- Map UI Elements -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
<div class="relative">
<div class="absolute -inset-4 bg-primary/20 rounded-full animate-ping"></div>
<div class="relative w-4 h-4 bg-primary rounded-full border-2 border-white"></div>
</div>
</div>
<!-- Other Drivers Markers -->
<div class="absolute top-1/4 left-1/3 text-primary/80">
<span class="material-icons-round text-2xl">local_shipping</span>
</div>
<div class="absolute bottom-1/3 right-1/4 text-primary/80">
<span class="material-icons-round text-2xl">directions_car</span>
</div>
<div class="absolute top-10 right-10 text-primary/60">
<span class="material-icons-round text-xl">local_shipping</span>
</div>
<div class="absolute inset-0 map-gradient-overlay"></div>
</div>
<!-- Radius Badge -->
<div class="absolute bottom-4 left-6 bg-background-dark/80 backdrop-blur-md px-4 py-2 rounded-full border border-primary/30 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
<span class="text-xs font-medium uppercase tracking-wider">Радиус 50 км: 12 водителей</span>
</div>
</div>
<!-- Main Interface -->
<main class="px-6 -mt-8 relative z-10 space-y-8">
<!-- Category Selector -->
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-background-light dark:bg-primary/5 border border-primary/20 transition-all hover:bg-primary/10 group">
<span class="material-icons-round text-primary mb-2 text-3xl group-active:scale-90 transition-transform">build</span>
<span class="text-xs font-medium">Поломка</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-background-light dark:bg-primary/5 border border-primary/20 transition-all hover:bg-primary/10 group">
<span class="material-icons-round text-primary mb-2 text-3xl group-active:scale-90 transition-transform">local_gas_station</span>
<span class="text-xs font-medium">Топливо</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-background-light dark:bg-primary/5 border border-primary/20 transition-all hover:bg-primary/10 group">
<span class="material-icons-round text-primary mb-2 text-3xl group-active:scale-90 transition-transform">hail</span>
<span class="text-xs font-medium">Эвакуатор</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl bg-background-light dark:bg-primary/5 border border-primary/20 transition-all hover:bg-primary/10 group">
<span class="material-icons-round text-primary mb-2 text-3xl group-active:scale-90 transition-transform">gavel</span>
<span class="text-xs font-medium">Юр. помощь</span>
</button>
</div>
<!-- Central SOS Button Section -->
<div class="flex flex-col items-center justify-center py-4">
<div class="relative group cursor-pointer">
<!-- Outer Rings -->
<div class="absolute -inset-8 bg-primary/10 rounded-full border border-primary/20"></div>
<div class="absolute -inset-4 bg-primary/20 rounded-full border border-primary/30"></div>
<!-- Main Button -->
<button class="relative w-40 h-40 bg-primary rounded-full flex flex-col items-center justify-center sos-glow border-4 border-white/10 active:scale-95 transition-transform duration-75">
<span class="text-4xl font-black text-white tracking-widest uppercase">SOS</span>
<span class="text-[10px] text-white/80 font-bold mt-1 tracking-[0.2em]">УДЕРЖИВАТЬ</span>
</button>
</div>
<p class="mt-10 text-sm text-center text-slate-400 max-w-[240px] leading-relaxed">
                    Нажмите и удерживайте кнопку, чтобы разослать сигнал о помощи ближайшим водителям
                </p>
</div>
</main>
<!-- Emergency Services Footer -->
<footer class="absolute bottom-0 inset-x-0 p-6 bg-gradient-to-t from-background-dark to-transparent">
<button class="w-full bg-slate-900 dark:bg-white text-white dark:text-background-dark py-4 rounded-full font-bold flex items-center justify-center gap-3 active:bg-slate-700 transition-colors shadow-xl">
<span class="material-icons-round">phone_in_talk</span>
                Вызов экстренных служб (112)
            </button>
<div class="flex justify-center mt-6">
<div class="w-32 h-1.5 bg-slate-700 rounded-full"></div>
</div>
</footer>
<!-- Location Status Toast -->
<div class="absolute top-24 left-1/2 -translate-x-1/2 w-[85%] bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-xl border border-primary/20 p-3 rounded-2xl flex items-center gap-4 shadow-2xl">
<div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center">
<span class="material-icons-round text-primary">gps_fixed</span>
</div>
<div>
<p class="text-xs font-bold uppercase tracking-tight text-primary">Геопозиция активна</p>
<p class="text-[11px] text-slate-500">Трасса М-5, 842-й километр</p>
</div>
</div>
</div>
