[build]
  command   = "npm install --legacy-peer-deps && npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(self), payment=()"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' https://api-maps.yandex.ru https://developer.tech.yandex.ru https://mc.yandex.ru https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://images.unsplash.com https://*.supabase.co https://static-maps.yandex.ru https://mc.yandex.ru; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.openweathermap.org https://geocode-maps.yandex.ru https://static-maps.yandex.ru https://mc.yandex.ru https://developer.tech.yandex.ru https://nominatim.openstreetmap.org https://*.ingest.us.sentry.io https://*.ingest.sentry.io https://challenges.cloudflare.com; frame-src https://player.vimeo.com https://www.youtube.com https://rutube.ru https://challenges.cloudflare.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"
